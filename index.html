<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d50-calculation</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
                                <!-- part-1 d50 -->
    <div class="container">
        <h1 id="d50-show1"> D50 Calculation</h1>
        <div class="inp1">
        <label for="input1"> 35 mesh value type</label>
        <input type="number" class="input1" id="input1" placeholder="type here correct value">
        </div>
        <div class="inp2">
            <label for="input2"> 60 mesh value type</label>
            <input type="number" class="input2" id="input2" placeholder="type here correct value">
        </div>
        <button class="button" id="d50-button">Show Result</button>

    </div>
                                 <!-- part-2 moisture -->
     <div class="container">
        <h1 id="d50-show2"> Moisture Calc..</h1>
        <div class="inp1">
        <label for="input1"> first weight</label>
        <input type="number" class="input1" id="input1m" placeholder="type here correct value">
        </div>
        <div class="inp2">
            <label for="input2"> second weight</label>
            <input type="number" class="input2" id="input2m" placeholder="type here correct value">
        </div>
        <button class="button" id="moisture-button">Show Result</button>

    </div>
</body>
<script src="script.js"></script>
</html>
